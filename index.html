<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EDUCAÇÃO FÍSICA - ANDRÉ BRITO</title>
    
    <!-- PWA Manifest & Settings -->
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3001/3001787.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3001/3001787.png">
    
    <!-- Import Arial/Helvetica fallback style -->
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Arial', 'Helvetica', 'sans-serif'],
              serif: ['Arial', 'Helvetica', 'sans-serif'],
              mono: ['Arial', 'Helvetica', 'sans-serif'],
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              fadeInDown: {
                '0%': { opacity: '0', transform: 'translateY(-10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              scaleIn: {
                '0%': { opacity: '0', transform: 'scale(0.95)' },
                '100%': { opacity: '1', transform: 'scale(1)' },
              }
            },
            animation: {
              'fade-in': 'fadeIn 0.5s ease-out',
              'fade-in-down': 'fadeInDown 0.6s ease-out',
              'scale-in': 'scaleIn 0.2s ease-out',
            }
          }
        }
      }
    </script>

    <style>
      body {
        background-color: #fdfaf6; /* Pérola/Champagne claro */
        margin: 0;
        overflow-x: hidden; /* Prevent horizontal scroll */
      }

      * {
        font-family: 'Arial', 'Helvetica', sans-serif !important;
      }
      
      h1, h2, h3, h4, h5, h6, header, header *, .uppercase-text {
        text-transform: uppercase !important;
      }
      
      /* Cabeçalho padrão (Sky Blue) - aplicável via classe no React */
      .header-sky-blue {
        background-color: #0ea5e9; /* Sky Blue */
      }
      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1; 
      }
      ::-webkit-scrollbar-thumb {
        background: #888; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #555; 
      }
      
      /* ESTILO DE VIDRO ATUALIZADO */
      .glass-panel {
        background-color: rgba(255, 255, 255, 0.85); /* Mais transparência (era 0.96) */
        backdrop-filter: blur(16px); /* Blur mais forte para suavizar o fundo */
        border: 1px solid rgba(255, 255, 255, 0.6); /* Borda mais definida */
        box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15); /* Sombra suave para profundidade */
      }
      
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.05);
        border-radius: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(0,0,0,0.2);
        border-radius: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: rgba(0,0,0,0.3);
      }

      /* Animated Gradient Text */
      .animate-gradient-text {
        background: linear-gradient(to right, #60a5fa, #c084fc, #f472b6, #60a5fa);
        background-size: 200% auto;
        color: transparent;
        -webkit-background-clip: text;
        background-clip: text;
        animation: gradient 3s linear infinite;
      }
      @keyframes gradient {
        to {
          background-position: 200% center;
        }
      }
    </style>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
    <script>
      // Register Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(registration => {
              console.log('SW registered: ', registration);
            })
            .catch(registrationError => {
              console.log('SW registration failed: ', registrationError);
            });
        });
      }
    </script>
  </body>
</html>
